# Деплой бота MAX в Railway
# Secrets: RAILWAY_TOKEN (обязательно), RAILWAY_PROJECT_ID, RAILWAY_SERVICE_ID (если нужен выбор проекта)
name: Deploy MAX Bot to Railway

on:
  push:
    branches: [main, master]
    paths:
      - "max-bot/**"
      - ".github/workflows/deploy-max-bot.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy max-bot to Railway
        run: railway up ./max-bot --path-as-root
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
